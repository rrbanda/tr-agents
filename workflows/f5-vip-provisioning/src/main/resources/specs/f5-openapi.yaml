openapi: 3.0.1
info:
  title: F5 BIG-IP VIP Management
  version: v1
servers:
  - url: /
security:
  - BearerToken: []
paths:
  /mgmt/tm/ltm/virtual:
    post:
      operationId: configureVip
      summary: Create or update a virtual server (VIP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                destination:
                  type: string
                pool:
                  type: string
      responses:
        "200":
          description: VIP configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  status:
                    type: string
components:
  securitySchemes:
    BearerToken:
      type: http
      scheme: bearer
