id: f5-vip-provisioning
version: "1.0"
specVersion: "0.8"
name: F5 VIP Provisioning Workflow
description: |
  End-to-end F5 VIP provisioning with agent-assisted DNS validation
  and evidence synthesis. Orchestrates automation stages (Infoblox, F5,
  ServiceNow via MCP) with AI reasoning stages (ADK agents via A2A).
start: RequestIntake
functions:
  - name: getInfobloxAssignment
    type: rest
    operation: "mcp-gateway:infoblox#getDnsAssignment"
  - name: validateDnsWithAgent
    type: rest
    operation: "https://f5-provisioning-agent:8002/message/send"
  - name: configureF5Vip
    type: rest
    operation: "mcp-gateway:f5#configureVip"
  - name: runConnectivityChecks
    type: rest
    operation: "mcp-gateway:connectivity#runChecks"
  - name: synthesizeEvidenceWithAgent
    type: rest
    operation: "https://f5-provisioning-agent:8002/message/send"
  - name: updateServiceNow
    type: rest
    operation: "mcp-gateway:servicenow#updateTicket"
  - name: notifyDnsTeam
    type: rest
    operation: "mcp-gateway:servicenow#addComment"
states:
  - name: RequestIntake
    type: event
    onEvents:
      - eventRefs:
          - ServiceNowWebhook
        actions: []
    transition: DnsIpAssignment

  - name: DnsIpAssignment
    type: operation
    actions:
      - name: fetchDnsAssignment
        functionRef:
          refName: getInfobloxAssignment
          arguments:
            request_id: "${ .request_id }"
        actionDataFilter:
          toStateData: "${ .dns_assignment }"
    transition: AgentDnsValidation

  - name: AgentDnsValidation
    type: operation
    actions:
      - name: callDnsValidationAgent
        functionRef:
          refName: validateDnsWithAgent
          arguments:
            jsonrpc: "2.0"
            method: "message/send"
            params:
              message:
                role: "user"
                messageId: "${ .request_id + '-dns-validation' }"
                parts:
                  - kind: "text"
                    text: "${ 'Validate DNS assignment for request ' + .request_id + '. Environment: ' + .environment }"
        actionDataFilter:
          toStateData: "${ .validation_result }"
    transition: CheckValidation

  - name: CheckValidation
    type: switch
    dataConditions:
      - name: ValidationPassed
        condition: "${ .validation_result.overall == 'PASS' }"
        transition: ConfigureF5
      - name: ValidationFailed
        condition: "${ .validation_result.overall == 'FAIL' }"
        transition: ReturnToDnsTeam
    defaultCondition:
      transition: ConfigureF5

  - name: ReturnToDnsTeam
    type: operation
    actions:
      - name: notifyDnsTeamOfIssues
        functionRef:
          refName: notifyDnsTeam
          arguments:
            request_id: "${ .request_id }"
            comment: "${ 'DNS validation failed. Findings: ' + .validation_result.findings | tostring }"
    end: true

  - name: ConfigureF5
    type: operation
    actions:
      - name: applyF5Configuration
        functionRef:
          refName: configureF5Vip
          arguments:
            vip_name: "${ .vip_name }"
            vip_ip: "${ .dns_assignment.assigned_ip }"
            pool_members: "${ .pool_members }"
            health_monitor: "${ .health_monitor }"
            ssl_profile: "${ .ssl_profile }"
        actionDataFilter:
          toStateData: "${ .f5_config_result }"
    transition: PostConfigChecks

  - name: PostConfigChecks
    type: operation
    actions:
      - name: runChecks
        functionRef:
          refName: runConnectivityChecks
          arguments:
            vip_ip: "${ .dns_assignment.assigned_ip }"
            pool_members: "${ .pool_members | join(',') }"
        actionDataFilter:
          toStateData: "${ .connectivity_result }"
    transition: AgentEvidenceSynthesis

  - name: AgentEvidenceSynthesis
    type: operation
    actions:
      - name: callEvidenceAgent
        functionRef:
          refName: synthesizeEvidenceWithAgent
          arguments:
            jsonrpc: "2.0"
            method: "message/send"
            params:
              message:
                role: "user"
                messageId: "${ .request_id + '-evidence' }"
                parts:
                  - kind: "text"
                    text: "${ 'Review completed F5 configuration for ' + .request_id + ' and synthesize evidence for approval.' }"
        actionDataFilter:
          toStateData: "${ .evidence_package }"
    transition: ApprovalGate

  - name: ApprovalGate
    type: callback
    action:
      name: requestApproval
      functionRef:
        refName: updateServiceNow
        arguments:
          request_id: "${ .request_id }"
          status: "pending_approval"
          evidence: "${ .evidence_package }"
    eventRef: ApprovalDecision
    transition: CheckApproval

  - name: CheckApproval
    type: switch
    dataConditions:
      - name: Approved
        condition: "${ .approval_decision == 'approved' }"
        transition: DocumentInServiceNow
      - name: Rejected
        condition: "${ .approval_decision == 'rejected' }"
        transition: HandleRejection
    defaultCondition:
      transition: HandleRejection

  - name: DocumentInServiceNow
    type: operation
    actions:
      - name: closeTicket
        functionRef:
          refName: updateServiceNow
          arguments:
            request_id: "${ .request_id }"
            status: "completed"
            evidence: "${ .evidence_package }"
            approval: "approved"
    end: true

  - name: HandleRejection
    type: operation
    actions:
      - name: updateTicketRejected
        functionRef:
          refName: updateServiceNow
          arguments:
            request_id: "${ .request_id }"
            status: "rejected"
            reason: "${ .rejection_reason }"
    end: true

events:
  - name: ServiceNowWebhook
    type: com.servicenow.request.created
    source: servicenow
  - name: ApprovalDecision
    type: com.rhdh.approval.decision
    source: backstage-ui
