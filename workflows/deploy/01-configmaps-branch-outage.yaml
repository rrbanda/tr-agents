apiVersion: v1
kind: ConfigMap
metadata:
  name: branch-outage-response-specs
  namespace: sonataflow-infra
data:
  servicenow-openapi.yaml: |
    openapi: 3.0.1
    info:
      title: ServiceNow Ticket Management
      version: v1
    servers:
      - url: /
    paths:
      /api/now/table/incident:
        post:
          operationId: createIncident
          summary: Create a new incident
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    short_description:
                      type: string
                    description:
                      type: string
                    urgency:
                      type: string
                    impact:
                      type: string
                    assignment_group:
                      type: string
          responses:
            "201":
              description: Incident created
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      result:
                        type: object
                        properties:
                          sys_id:
                            type: string
                          number:
                            type: string
  teams-openapi.yaml: |
    openapi: 3.0.1
    info:
      title: Microsoft Teams Notification Service
      version: v1
    servers:
      - url: /
    paths:
      /send:
        post:
          operationId: sendMessage
          summary: Send a message to a Teams channel
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    channel:
                      type: string
                    message:
                      type: string
                    severity:
                      type: string
                      enum: [critical, high, medium, low]
          responses:
            "200":
              description: Message sent
  sms-openapi.yaml: |
    openapi: 3.0.1
    info:
      title: SMS Alert Service
      version: v1
    servers:
      - url: /
    paths:
      /send:
        post:
          operationId: sendSms
          summary: Send an SMS alert
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    to:
                      type: string
                    message:
                      type: string
          responses:
            "200":
              description: SMS sent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: branch-outage-response-schemas
  namespace: sonataflow-infra
data:
  branch-outage-response__main-schema.json: |
    {
      "$id": "classpath:/schemas/branch-outage-response__main-schema.json",
      "title": "Branch Outage Response Input",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "type": "object",
      "properties": {
        "branchId": { "title": "Branch ID", "type": "string" },
        "threatLevel": { "title": "Threat Level", "type": "string", "enum": ["CRITICAL", "HIGH", "MEDIUM"] },
        "threatScore": { "title": "Threat Score", "type": "integer", "minimum": 0, "maximum": 100 },
        "assessmentSummary": { "title": "Assessment Summary", "type": "string" },
        "contributingFactors": { "title": "Contributing Factors", "type": "string" },
        "networkTeam": { "title": "Network Team", "type": "string" },
        "branchManagerPhone": { "title": "Branch Manager Phone", "type": "string" },
        "recommendedActions": { "title": "Recommended Actions", "type": "string" }
      },
      "required": ["branchId", "threatLevel", "assessmentSummary"]
    }
  workflow-output-schema.json: |
    {
      "$id": "classpath:/schemas/workflow-output-schema.json",
      "title": "Workflow Output",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "type": "object",
      "properties": {
        "result": {
          "type": "object",
          "properties": {
            "message": { "type": "string" },
            "outputs": {
              "type": "array",
              "items": {
                "type": "object",
                "properties": {
                  "key": { "type": "string" },
                  "value": { "type": "string" },
                  "format": { "type": "string" }
                }
              }
            }
          }
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: branch-outage-response-props
  namespace: sonataflow-infra
data:
  application.properties: |
    quarkus.rest-client.servicenow-openapi_yaml.url=http://mock-workflow-backends:8080
    quarkus.rest-client.teams-openapi_yaml.url=http://mock-workflow-backends:8080
    quarkus.rest-client.sms-openapi_yaml.url=http://mock-workflow-backends:8080
    quarkus.log.level=INFO
    quarkus.log.category."org.kie".level=INFO
