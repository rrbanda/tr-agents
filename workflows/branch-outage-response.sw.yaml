id: branch-outage-response
version: "1.0"
specVersion: "0.8"
name: Branch Outage Response Workflow
description: |
  Triggered by the Branch Monitor agent when a HIGH/CRITICAL threat
  is detected. Orchestrates the response: alert notifications,
  ServiceNow incident creation, and field tech dispatch.
start: ReceiveThreatAssessment
functions:
  - name: sendTeamsAlert
    type: rest
    operation: "mcp-gateway:notifications#sendTeams"
  - name: sendSmsAlert
    type: rest
    operation: "mcp-gateway:notifications#sendSms"
  - name: createServiceNowIncident
    type: rest
    operation: "mcp-gateway:servicenow#createIncident"
  - name: checkTechAvailability
    type: rest
    operation: "mcp-gateway:dispatch#checkAvailability"
  - name: scheduleTechDispatch
    type: rest
    operation: "mcp-gateway:dispatch#schedule"
states:
  - name: ReceiveThreatAssessment
    type: event
    onEvents:
      - eventRefs:
          - ThreatDetected
        actions: []
    transition: ClassifyResponse

  - name: ClassifyResponse
    type: switch
    dataConditions:
      - name: CriticalThreat
        condition: "${ .threat_level == 'CRITICAL' }"
        transition: CriticalResponse
      - name: HighThreat
        condition: "${ .threat_level == 'HIGH' }"
        transition: HighResponse
    defaultCondition:
      transition: MediumResponse

  - name: CriticalResponse
    type: parallel
    branches:
      - name: alertNetworkTeam
        actions:
          - name: teamsAlertCritical
            functionRef:
              refName: sendTeamsAlert
              arguments:
                channel: "${ .network_team }"
                severity: "CRITICAL"
                message: "${ .assessment_summary }"
          - name: phoneAlertCritical
            functionRef:
              refName: sendSmsAlert
              arguments:
                recipients: "${ .network_team_lead_phone }"
                message: "${ 'CRITICAL: ' + .branch_name + ' - ' + .assessment_summary }"
      - name: alertBranchManager
        actions:
          - name: smsAlertManager
            functionRef:
              refName: sendSmsAlert
              arguments:
                recipients: "${ .branch_manager_phone }"
                message: "${ 'CRITICAL network threat: ' + .branch_name + '. ' + .recommended_actions[0] }"
      - name: createIncident
        actions:
          - name: createP1Incident
            functionRef:
              refName: createServiceNowIncident
              arguments:
                branch_id: "${ .branch_id }"
                priority: "P1"
                threat_level: "CRITICAL"
                assessment: "${ .assessment_summary }"
                assigned_to: "${ .network_team }"
      - name: dispatchTech
        actions:
          - name: checkTech
            functionRef:
              refName: checkTechAvailability
              arguments:
                region: "${ .region }"
          - name: dispatch
            functionRef:
              refName: scheduleTechDispatch
              arguments:
                branch_id: "${ .branch_id }"
                urgency: "immediate"
                equipment_needed: "${ .recommended_equipment }"
    transition: ResponseComplete

  - name: HighResponse
    type: parallel
    branches:
      - name: alertNetworkTeam
        actions:
          - name: teamsAlertHigh
            functionRef:
              refName: sendTeamsAlert
              arguments:
                channel: "${ .network_team }"
                severity: "HIGH"
                message: "${ .assessment_summary }"
      - name: alertBranchManager
        actions:
          - name: smsAlertManager
            functionRef:
              refName: sendSmsAlert
              arguments:
                recipients: "${ .branch_manager_phone }"
                message: "${ 'HIGH network threat: ' + .branch_name + '. Check backup connectivity.' }"
      - name: createIncident
        actions:
          - name: createP2Incident
            functionRef:
              refName: createServiceNowIncident
              arguments:
                branch_id: "${ .branch_id }"
                priority: "P2"
                threat_level: "HIGH"
                assessment: "${ .assessment_summary }"
                assigned_to: "${ .network_team }"
    transition: ResponseComplete

  - name: MediumResponse
    type: operation
    actions:
      - name: teamsAlertMedium
        functionRef:
          refName: sendTeamsAlert
          arguments:
            channel: "${ .network_team }"
            severity: "MEDIUM"
            message: "${ .assessment_summary }"
    transition: ResponseComplete

  - name: ResponseComplete
    type: operation
    actions: []
    end: true

events:
  - name: ThreatDetected
    type: com.branch-monitor.threat.detected
    source: branch-monitor-agent
